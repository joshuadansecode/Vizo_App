<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c298",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0a1628",
                        "surface-dark": "#112038",
                        "muted-sky": "#7faeca"
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Vizo Authentication - Sign Up</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-[430px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden border-x border-slate-200 dark:border-slate-800">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button aria-label="Retour" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<div class="flex-1 text-center pr-12">
<h2 class="text-primary text-xl font-bold leading-tight tracking-[0.1em]">VIZO</h2>
</div>
</div>
<!-- Header Content -->
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight">Créer mon compte</h1>
<p class="text-slate-600 dark:text-muted-sky text-base font-normal leading-normal mt-2">Saisis ton numéro WhatsApp pour commencer.</p>
</div>
<!-- Form Area -->
<div class="flex flex-col gap-5 px-6 py-4">
<!-- Prénom -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-muted-sky text-sm font-medium ml-1">Prénom ou Pseudo</label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary border-none bg-slate-200 dark:bg-surface-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Ex: Jean" type="text"/>
</div>
</div>
<!-- WhatsApp Number with Country Code -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-muted-sky text-sm font-medium ml-1">Numéro de téléphone (WhatsApp)</label>
<div class="flex gap-3">
<div class="flex items-center justify-center bg-slate-200 dark:bg-surface-dark rounded-xl h-14 px-3 min-w-[80px] text-slate-900 dark:text-white font-medium border-none cursor-pointer">
<span>+229</span>
<span class="material-symbols-outlined text-sm ml-1">expand_more</span>
</div>
<input class="form-input flex-1 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary border-none bg-slate-200 dark:bg-surface-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="97 00 00 00" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-muted-sky text-sm font-medium ml-1">Mot de passe</label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary border-none bg-slate-200 dark:bg-surface-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Opt-in Checkbox -->
<label class="flex items-start gap-3 mt-2 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input class="peer h-5 w-5 rounded border-none bg-slate-200 dark:bg-surface-dark text-primary focus:ring-offset-0 focus:ring-primary checked:bg-primary" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-xs opacity-0 peer-checked:opacity-100 pointer-events-none left-1/2 -translate-x-1/2">check</span>
</div>
<span class="text-slate-600 dark:text-muted-sky text-sm leading-tight">
                    J'accepte de partager mon numéro avec la communauté Vizo pour participer au pool de contacts.
                </span>
</label>
</div>
<!-- Action Area -->
<div class="mt-auto px-6 py-8 flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg h-14 rounded-full transition-all active:scale-[0.98] shadow-lg shadow-primary/20">
                S'inscrire
            </button>
<a class="text-primary text-center font-semibold text-base py-2 hover:underline decoration-primary underline-offset-4" href="#">
                Déjà un compte ? Se connecter
            </a>
</div>
<!-- Spacer for iOS home indicator -->
<div class="h-6"></div>
</div>
</body></html>
