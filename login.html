<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c298",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0A1628", // Deep Navy from prompt
                        "surface-dark": "#112038", // Surface Navy from prompt
                        "muted-sky": "#7FAECA",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .form-input:focus {
            box-shadow: 0 0 0 2px rgba(0, 194, 152, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 sticky top-0 z-10 bg-background-dark/80 backdrop-blur-md">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-white text-2xl">arrow_back</span>
</button>
<div class="flex-1 flex justify-center pr-10">
<span class="text-white font-bold tracking-[0.2em] text-xl">VIZO</span>
</div>
</header>
<main class="flex-1 flex flex-col px-6 pt-10 max-w-md mx-auto w-full">
<!-- Title Area -->
<div class="mb-10">
<h1 class="text-white text-4xl font-bold mb-3">Te revoilà !</h1>
<p class="text-muted-sky text-lg">Connecte-toi pour booster tes vues.</p>
</div>
<!-- Form Area -->
<form class="space-y-6">
<!-- Phone Input -->
<div class="space-y-2">
<label class="block text-slate-300 text-sm font-medium pl-1">Numéro de téléphone (WhatsApp)</label>
<div class="flex gap-2">
<div class="relative w-28 shrink-0">
<select class="w-full h-14 bg-surface-dark border-none rounded-xl text-white pl-4 pr-10 appearance-none focus:ring-1 focus:ring-primary/50">
<option value="+33">+33 🇫🇷</option>
<option value="+225">+225 🇨🇮</option>
<option value="+221">+221 🇸🇳</option>
<option value="+237">+237 🇨🇲</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
<input class="flex-1 h-14 bg-surface-dark border-none rounded-xl text-white px-4 placeholder:text-slate-500 focus:ring-1 focus:ring-primary/50" placeholder="06 12 34 56 78" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-slate-300 text-sm font-medium pl-1">Mot de passe</label>
<div class="relative">
<input class="w-full h-14 bg-surface-dark border-none rounded-xl text-white px-4 pr-12 placeholder:text-slate-500 focus:ring-1 focus:ring-primary/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-primary text-sm font-medium hover:opacity-80 transition-opacity" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Action Area -->
<div class="pt-8 space-y-6">
<button class="w-full h-14 bg-primary text-background-dark font-bold text-lg rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
                    Se connecter
                </button>
<p class="text-center text-slate-400 text-sm">
                    Nouveau sur Vizo ? 
                    <a class="text-primary font-bold ml-1 hover:underline" href="#">Créer un compte</a>
</p>
</div>
</form>
<!-- Aesthetic Background Elements (Abstract) -->
<div class="fixed -bottom-20 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[80px] pointer-events-none"></div>
</main>
<!-- Decorative Image for Context -->
<div class="hidden md:block fixed right-10 bottom-10 w-32 h-32 opacity-20">
<div class="w-full h-full bg-gradient-to-tr from-primary to-transparent rounded-2xl rotate-12" data-alt="Abstract glowing geometric neon shape background"></div>
</div>
</body></html>
