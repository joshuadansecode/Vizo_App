<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c298",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0a1628",
                        "muted-sky": "#7faeca",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 194, 152, 0.5);
        }
        .card-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center overflow-x-hidden">
<div class="relative flex h-screen w-full max-w-[430px] flex-col bg-background-light dark:bg-background-dark overflow-hidden px-6 pt-4 pb-10">
<!-- Header -->
<div class="flex items-center justify-between w-full mb-8">
<div class="w-12"></div>
<h2 class="text-primary text-xl font-extrabold tracking-widest neon-glow font-display uppercase">VIZO</h2>
<button class="text-muted-sky text-sm font-semibold hover:opacity-80 transition-opacity">Passer</button>
</div>
<!-- Hero Section: 3D Illustration Mockup -->
<div class="flex-1 flex flex-col items-center justify-center relative">
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Decorative background elements -->
<div class="absolute w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<!-- Main 3D Floating Card -->
<div class="card-glass rounded-xl p-6 w-72 transform -rotate-3 shadow-2xl relative z-10 border-primary/20">
<div class="flex items-center justify-between mb-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">visibility</span>
<div>
<p class="text-[10px] text-muted-sky font-medium uppercase tracking-wider">Visibilité</p>
<p class="text-2xl font-bold text-slate-100">+124%</p>
</div>
</div>
<div class="bg-primary/20 px-2 py-1 rounded-full">
<p class="text-[10px] text-primary font-bold">LIVE</p>
</div>
</div>
<!-- SVG Chart -->
<div class="w-full h-24 mb-4">
<svg class="w-full h-full" viewbox="0 0 100 40">
<path d="M0,35 Q10,32 20,25 T40,28 T60,15 T80,20 T100,5" fill="none" stroke="#00c298" stroke-linecap="round" stroke-width="3"></path>
<defs>
<lineargradient id="grad" x1="0%" x2="0%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:rgba(0,194,152,0.3);stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:rgba(0,194,152,0);stop-opacity:0"></stop>
</lineargradient>
</defs>
<path d="M0,35 Q10,32 20,25 T40,28 T60,15 T80,20 T100,5 V40 H0 Z" fill="url(#grad)"></path>
</svg>
</div>
<div class="flex justify-between items-center border-t border-white/5 pt-4">
<div class="flex -space-x-2">
<div class="w-6 h-6 rounded-full bg-slate-700 border border-background-dark"></div>
<div class="w-6 h-6 rounded-full bg-slate-600 border border-background-dark"></div>
<div class="w-6 h-6 rounded-full bg-slate-500 border border-background-dark"></div>
</div>
<p class="text-[10px] text-muted-sky">8.2k vues cette heure</p>
</div>
</div>
<!-- Secondary Floating Elements -->
<div class="absolute top-10 right-4 card-glass p-3 rounded-lg transform rotate-12 shadow-xl z-20 border-primary/10">
<span class="material-symbols-outlined text-primary text-xl">trending_up</span>
</div>
<div class="absolute bottom-10 left-4 card-glass p-3 rounded-lg transform -rotate-12 shadow-xl z-20 border-primary/10">
<span class="material-symbols-outlined text-primary text-xl">favorite</span>
</div>
</div>
</div>
<!-- Content Area -->
<div class="text-center mt-8 space-y-4">
<h1 class="text-slate-100 text-3xl font-extrabold font-display leading-tight">Analyse tes performances</h1>
<p class="text-muted-sky text-base font-normal leading-relaxed px-4">
                Suis ton score de visibilité en temps réel et découvre tes contenus les plus performants.
            </p>
</div>
<!-- Footer / Navigation -->
<div class="mt-12 flex flex-col items-center gap-8">
<!-- Pagination Dots -->
<div class="flex items-center gap-2">
<div class="h-1.5 w-1.5 rounded-full bg-muted-sky/30"></div>
<div class="h-1.5 w-1.5 rounded-full bg-muted-sky/30"></div>
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-muted-sky/30"></div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-slate-100 font-bold py-5 rounded-full text-lg shadow-[0_10px_30px_-10px_rgba(0,194,152,0.5)] transition-all active:scale-[0.98]">
                Continuer
            </button>
</div>
</div>
</body></html>
